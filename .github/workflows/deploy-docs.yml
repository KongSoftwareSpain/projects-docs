name: Deploy Docs

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "mkdocs>=1.5.0,<2.0.0" mkdocs-material mkdocs-encryptcontent-plugin
          mkdocs --version

      - name: Configure Git with token
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/KongSoftwareSpain/projects-docs.git

      - name: Inject password into mkdocs.yml
        env:
          DOCS_PASSWORD: ${{ secrets.DOCS_PASSWORD }}
        run: |
          if [ -z "$DOCS_PASSWORD" ]; then
            echo "::error::The DOCS_PASSWORD secret is NOT defined in GitHub Secrets!"
            exit 1
          fi
          python -c "import os; content = open('mkdocs.yml').read(); open('mkdocs.yml', 'w').write(content.replace('GLOBAL_PASSWORD_PLACEHOLDER', os.environ['DOCS_PASSWORD']))"

      - name: Deploy to GitHub Pages
        env:
          DOCS_PASSWORD: ${{ secrets.DOCS_PASSWORD }}
        run: |
          mkdocs gh-deploy --force
